name: Build and Publish OpenFoodDiary Container

on:
  workflow_call:
    inputs:
      VERSION:
        type: string
        required: true
      PUSH:
        type: boolean
        default: false
        required: false
      PUSH_LATEST:
        type: boolean
        default: false
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-node@v5
        with:
          node-version-file: "./tests/api/e2e/.nvmrc"

      - name: Build the Container image
        working-directory: .
        run: |
          platarch=linux/arm/v7,linux/arm64/v8,linux/amd64
          docker buildx build --platform=$platarch --tag ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} .

      - name: Install Test Dependancies
        working-directory: tests/api/e2e
        run: npm ci

      - name: Bring up stack
        working-directory: tests/api/e2e
        run: |
          OPENFOODDIARY_USERIDHEADER=x-openfooddiary-userid-test docker compose up -d

      - name: Wait for Stack
        timeout-minutes: 1
        run: |
          while curl --output /dev/null --silent --head --fail http://localhost:3022/api/ping;
          do
            echo "Waiting"
          done

      - name: Test the Image
        working-directory: tests/api/e2e
        run: |
          OPENFOODDIARY_API_HOST=http://localhost:3022 OPENFOODDIARY_USERIDHEADER=x-openfooddiary-userid-test npm test

      - name: Push Version
        if: ${{ inputs.PUSH }}
        run: docker push ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }}

      - name: Push Latest
        if: ${{ inputs.PUSH && inputs.PUSH_LATEST }}
        run: |
          docker tag ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} ghcr.io/openhealthsuite/diary:latest
          docker push ghcr.io/openhealthsuite/diary:latest ghcr.io/openhealthsuite/diary:latest
