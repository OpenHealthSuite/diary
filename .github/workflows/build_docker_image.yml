name: Build and Publish OpenFoodDiary Container

on:
  workflow_call:
    inputs:
      VERSION:
        type: string
        required: true
      PUSH:
        type: boolean
        default: false
        required: false
      PUSH_LATEST:
        type: boolean
        default: false
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-node@v5
        with:
          node-version-file: "./tests/api/e2e/.nvmrc"

      - name: Build the Container image
        working-directory: .
        run: |
          platarch=linux/arm64/v8,linux/amd64
          docker buildx build --platform=$platarch --tag ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} .

      - name: Install Test Dependancies
        working-directory: tests/api/e2e
        run: npm ci

      - name: Bring up stack
        working-directory: .
        run: |
          docker compose up -d

      - name: Wait for Postgres healthy
        # wait for postgres healthcheck to report healthy (requires the service to have a healthcheck)
        timeout-minutes: 2
        run: |
          set -euo pipefail
          MAX_WAIT=120
          INTERVAL=1
          echo "Waiting up to ${MAX_WAIT}s for postgres service to be healthy"
          cid=""
          # Wait until compose has created the container
          until [ -n "$cid" ]; do
            cid=$(docker compose ps -q postgres || true)
            if [ -n "$cid" ]; then
              break
            fi
            sleep 1
          done
          i=0
          while true; do
            status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo unknown)
            echo "Postgres health: $status"
            if [ "$status" = "healthy" ]; then
              echo "Postgres is healthy"
              break
            fi
            i=$((i+INTERVAL))
            if [ "$i" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for postgres to be healthy"
              echo "--- docker compose ps ---"
              docker compose ps
              echo "--- docker compose logs: postgres (last 200 lines) ---"
              docker compose logs --no-color --tail 200 postgres || true
              exit 1
            fi
            sleep $INTERVAL
          done

      - name: Wait for Stack
        # wait until the API responds (loop until curl succeeds). Print diagnostics and fail if not ready within timeout.
        timeout-minutes: 2
        run: |
          set -euo pipefail
          MAX_WAIT=120
          INTERVAL=1
          i=0
          echo "Waiting up to ${MAX_WAIT}s for API at http://localhost:3022/api/ping"
          until curl --output /dev/null --silent --head --fail http://localhost:3022/api/ping; do
            i=$((i+INTERVAL))
            if [ "$i" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for API after ${MAX_WAIT}s"
              echo "--- docker compose ps ---"
              docker compose ps
              echo "--- docker compose logs: app (last 200 lines) ---"
              docker compose logs --no-color --tail 200 app || true
              echo "--- docker compose logs: postgres (last 200 lines) ---"
              docker compose logs --no-color --tail 200 postgres || true
              exit 1
            fi
            echo "Waiting for API at http://localhost:3022/api/ping (${i}s)"
            sleep ${INTERVAL}
          done
          echo "API is responding"

      - name: Test the Image
        working-directory: tests/api/e2e
        run: |
          OPENFOODDIARY_API_HOST=http://localhost:3022 npm test

      - name: Push Version
        if: ${{ inputs.PUSH }}
        run: docker push ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }}

      - name: Push Latest
        if: ${{ inputs.PUSH && inputs.PUSH_LATEST }}
        run: |
          docker tag ghcr.io/openhealthsuite/diary:${{ inputs.VERSION }} ghcr.io/openhealthsuite/diary:latest
          docker push ghcr.io/openhealthsuite/diary:latest ghcr.io/openhealthsuite/diary:latest
