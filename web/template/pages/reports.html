{{ define "pages/reports" }}
{{ template "layouts/base/header" . }}



<div id="logs-page">

  <div id="logs-container">
    {{ range $key, $metric := .Metrics }}
      <div>
        <h3>{{ $metric.Label }} Totals (last 7 days)</h3>
        <object data="/charts/{{$key}}/total.svg" type="image/svg+xml"></object>
      </div>
      <div>
        <h3>{{ $metric.Label }} Totals (last 30 days)</h3>
        <object data="/charts/{{$key}}/total.svg?startdate={{$.ThirtyDaysAgo}}" type="image/svg+xml"></object>
      </div>
    {{ end }}
  </div>

</div>

{{ template "components/navigation" . }}
{{ template "layouts/base/footer" . }}
{{ end }}
